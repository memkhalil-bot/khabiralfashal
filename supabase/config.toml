project_id = "shkdcquwpeexfwmkdnxq"

[functions.create-checkout-session]
# Gateway-level JWT check: rejects anon/unauthenticated callers before the
# function runs. The function itself further restricts access to admins
# only, via the is_current_user_admin() RPC.
verify_jwt = true

[functions.stripe-webhook]
# Stripe never sends a Supabase auth token, so the gateway-level JWT check
# must be off here. Authenticity instead comes entirely from verifying the
# Stripe-Signature header against STRIPE_WEBHOOK_SECRET inside the function.
verify_jwt = false

